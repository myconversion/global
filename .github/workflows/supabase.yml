name: Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - supabase/migrations/**
      - supabase/functions/**

jobs:
  migrations:
    name: Apply migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations
        run: supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: migrations
    if: |
      contains(join(github.event.commits.*.modified, ','), 'supabase/functions/') ||
      contains(join(github.event.commits.*.added, ','), 'supabase/functions/')

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy create-user function
        run: supabase functions deploy create-user --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-scheduled-message function
        run: supabase functions deploy send-scheduled-message --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
